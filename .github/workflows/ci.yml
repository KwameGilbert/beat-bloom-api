name: CI/CD Pipeline

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

env:
  NODE_VERSION: '22'
  PNPM_VERSION: '9'

jobs:
  # ============================================
  # Code Quality & Linting
  # ============================================
  lint:
    name: 🔍 Lint & Format Check
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v6

      - name: 📦 Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: 📥 Install dependencies
        run: pnpm install --frozen-lockfile

      - name: 🔍 Run ESLint
        run: pnpm run lint

      - name: 💅 Check Prettier formatting
        run: pnpm exec prettier --check "src/**/*.js"

  # ============================================
  # Security Audit
  # ============================================
  security:
    name: 🔒 Security Audit
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v6

      - name: 📦 Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: 📥 Install dependencies
        run: pnpm install --frozen-lockfile

      - name: 🔒 Run security audit
        run: pnpm audit --audit-level=high
        continue-on-error: true

      - name: 🛡️ Run npm audit (additional check)
        run: npm audit --audit-level=high
        continue-on-error: true

  # ============================================
  # Unit & Integration Tests
  # ============================================
  test:
    name: 🧪 Test (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20, 22]
      fail-fast: false

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v6

      - name: 📦 Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: 🟢 Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'pnpm'

      - name: 📥 Install dependencies
        run: pnpm install --frozen-lockfile

      - name: 🧪 Run tests with coverage
        run: pnpm run test:coverage
        env:
          NODE_ENV: test
          DB_CLIENT: pg
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: test_db
          DB_USER: postgres
          DB_PASSWORD: postgres
          JWT_SECRET: test-jwt-secret-key-that-is-at-least-32-characters-long
          JWT_REFRESH_SECRET: test-refresh-secret-key-that-is-at-least-32-characters-long

      - name: 📊 Upload coverage report
        uses: codecov/codecov-action@v5
        if: matrix.node-version == 22
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false
        continue-on-error: true

  # ============================================
  # Build Verification
  # ============================================
  build:
    name: 🏗️ Build Verification
    runs-on: ubuntu-latest
    needs: [lint]

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v6

      - name: 📦 Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: 📥 Install dependencies
        run: pnpm install --frozen-lockfile

      - name: ✅ Verify app can start
        run: |
          timeout 10s node src/server.js || code=$?
          if [ $code -eq 124 ]; then
            echo "✅ App started successfully (timeout as expected)"
            exit 0
          else
            echo "❌ App failed to start"
            exit 1
          fi
        env:
          NODE_ENV: production
          PORT: 3000
          DB_CLIENT: pg
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: app_db
          DB_USER: postgres
          DB_PASSWORD: postgres
          JWT_SECRET: build-test-jwt-secret-key-that-is-at-least-32-characters-long
          JWT_REFRESH_SECRET: build-test-refresh-secret-key-at-least-32-characters-long
        continue-on-error: true

  # ============================================
  # Docker Build
  # ============================================
  docker:
    name: 🐳 Docker Build
    runs-on: ubuntu-latest
    needs: [lint, test]

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v6

      - name: 🐳 Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: 🏗️ Build Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          load: true
          tags: express-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: 🧪 Test Docker image
        run: |
          docker run -d --name test-container \
            -e NODE_ENV=production \
            -e PORT=3000 \
            -e DB_CLIENT=pg \
            -e DB_HOST=localhost \
            -e DB_NAME=app_db \
            -e DB_USER=postgres \
            -e DB_PASSWORD=postgres \
            -e JWT_SECRET=docker-test-jwt-secret-key-at-least-32-characters-long \
            -e JWT_REFRESH_SECRET=docker-test-refresh-key-at-least-32-characters-long \
            -p 3000:3000 \
            express-backend:${{ github.sha }}

          sleep 5

          if docker ps | grep -q test-container; then
            echo "✅ Docker container is running"
          else
            echo "⚠️ Container stopped (expected without DB)"
            docker logs test-container
          fi

          docker stop test-container || true
          docker rm test-container || true

  # ============================================
  # Deployment Readiness Check
  # ============================================
  deploy-check:
    name: 🚀 Deployment Readiness
    runs-on: ubuntu-latest
    needs: [lint, test, security, docker]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v6

      - name: ✅ All checks passed
        run: |
          echo "🎉 All CI checks passed!"
          echo ""
          echo "📋 Summary:"
          echo "  ✅ Linting passed"
          echo "  ✅ Tests passed"
          echo "  ✅ Security audit completed"
          echo "  ✅ Docker build successful"
          echo ""
          echo "🚀 Ready for deployment!"

      - name: 📝 Create deployment summary
        run: |
          echo "## 🚀 Deployment Readiness Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Linting | ✅ Passed |" >> $GITHUB_STEP_SUMMARY
          echo "| Tests | ✅ Passed |" >> $GITHUB_STEP_SUMMARY
          echo "| Security Audit | ✅ Completed |" >> $GITHUB_STEP_SUMMARY
          echo "| Docker Build | ✅ Successful |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Triggered by:** @${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
